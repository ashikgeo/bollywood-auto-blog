name: Bollywood Auto Blog Publisher

on:
  schedule:
    - cron: '30 4 * * *'
  workflow_dispatch:

jobs:
  publish-blog:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Python setup karo
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Dependencies install karo
      run: pip install requests

    - name: Blog post likho aur publish karo
      env:
        BLOGGER_CLIENT_ID: ${{ secrets.BLOGGER_CLIENT_ID }}
        BLOGGER_CLIENT_SECRET: ${{ secrets.BLOGGER_CLIENT_SECRET }}
        BLOGGER_REFRESH_TOKEN: ${{ secrets.BLOGGER_REFRESH_TOKEN }}
        BLOGGER_BLOG_ID: ${{ secrets.BLOGGER_BLOG_ID }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        GOOGLE_CX: ${{ secrets.GOOGLE_CX }}
      run: python blog_writer.py
